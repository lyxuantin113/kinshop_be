services:
  database:
    image: postgres:15-alpine
    container_name: kinshop_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kinshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: kinshop_api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@database:5432/kinshop?schema=public
      - PORT=3000
    depends_on:
      - database

volumes:
  postgres_data:
